{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "preview.api.name" . }}
  labels:
    {{- include "preview.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "preview.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "preview.api.selectorLabels" . | nindent 8 }}
      annotations:
        workbench.preview/sha: "{{ .Values.commitSha }}"
    spec:
      {{- with .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
          {{- with .Values.api.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - secretRef:
                # Fail-fast at render time if the workflow forgot to set
                # secretName; an empty value would produce a Pod that
                # crash-loops on missing env vars.
                name: {{ required "api.secretName is required when api.enabled=true" .Values.api.secretName }}
          readinessProbe:
            httpGet: { path: /docs, port: http }
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /docs, port: http }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
