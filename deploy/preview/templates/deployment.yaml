apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "preview.name" . }}
  labels:
    {{- include "preview.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "preview.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "preview.selectorLabels" . | nindent 8 }}
      annotations:
        workbench.preview/sha: "{{ .Values.commitSha }}"
    spec:
      {{- with .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: PORT
              value: "{{ .Values.service.targetPort }}"
            {{- if .Values.api.secretName }}
            # The Next.js server-side renderer fetches HF tokenizers when
            # rendering /workbench/[workspaceId]/[chartId]; gated repos
            # need HF_TOKEN. Pull just that key from the shared api
            # secret — don't envFrom the whole secret, which would also
            # expose NDIF_API_KEY inside the web container.
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.secretName }}
                  key: HF_TOKEN
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
