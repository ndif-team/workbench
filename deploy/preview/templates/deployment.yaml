apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "preview.name" . }}
  labels:
    {{- include "preview.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "preview.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "preview.selectorLabels" . | nindent 8 }}
      annotations:
        workbench.preview/sha: "{{ .Values.commitSha }}"
    spec:
      {{- with .Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ . }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            - name: PORT
              value: "{{ .Values.service.targetPort }}"
            {{- if .Values.api.secretName }}
            # The Next.js server-side renderer fetches HF tokenizers when
            # rendering /workbench/[workspaceId]/[chartId]; gated repos
            # need HF_TOKEN. Pull just that key from the shared api
            # secret — don't envFrom the whole secret, which would also
            # expose NDIF_API_KEY inside the web container.
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.secretName }}
                  key: HF_TOKEN
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Next.js prod cold start SSRs `/` on the first probe hit; on a
          # busy shared node that render can take several seconds, so
          # the default 1s probe timeout was tripping and kubelet was
          # killing the container mid-startup. Give both probes a 5s
          # timeout, and pad initialDelay so we don't sample during the
          # first slow render.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
