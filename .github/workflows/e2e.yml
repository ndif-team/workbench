name: E2E Tests
on:
  push:
    # Only post-merge runs on long-lived branches. Feature branches go
    # via the pull_request trigger so we don't double-fire (push +
    # pull_request) for every commit on an open PR.
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# Cancel in-flight runs when a newer commit lands on the same PR/branch.
concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    # Ramdisk runner: 32 GiB tmpfs workspace, so the uv torch resolve +
    # bun install + Playwright browser launches all hit RAM instead of
    # ceph-backed scratch. Docker is available here (same pool the
    # pawtograder e2e-local job uses), which is what `supabase start` needs.
    runs-on: ripley-cloud-ramdisk
    env:
      # Real-NDIF e2e: a restricted model config (gpt2-only) keeps the
      # `/models/` endpoint from probing gated repos at startup.
      CONFIG: e2e
      REMOTE: "true"
      NDIF_API_KEY: ${{ secrets.NDIF_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      # Per-run Supabase project name → tags this run's containers/volumes so
      # two e2e jobs sharing the runner pool never clobber each other. sed'd
      # into supabase/config.toml `project_id` before any `supabase` call.
      SUPABASE_PROJECT: workbench-${{ github.run_id }}-${{ github.run_attempt }}
      # Supabase local-dev keys are deterministic (the public "supabase-demo"
      # JWT secret). Hardcoding lets us write .env and run `next build` before
      # `supabase start` finishes — no need to parse `supabase status`.
      LOCAL_SUPABASE_URL: http://127.0.0.1:54321
      LOCAL_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      LOCAL_SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      # Freshly-created admin user for the workshop-admin spec. Its email is
      # allowlisted via ADMIN_EMAILS below so getAdminEmail() lets it in.
      E2E_ADMIN_EMAIL: e2e-admin-${{ github.run_id }}-${{ github.run_attempt }}@workbench.test
      # Per-run scratch for PID / log files. /tmp persists across jobs on
      # self-hosted runners, so namespacing avoids `kill $(cat ...pid)`
      # targeting a recycled PID from an unrelated process.
      RUN_TMP: /tmp/e2e-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.27"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: supabase/setup-cli@v1
        with:
          # Pin the CLI — `latest` makes runs non-reproducible. Bump deliberately.
          version: 2.109.0

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: workbench/_web/node_modules
          # bun.lock (text), not the obsolete bun.lockb (binary). Hashing
          # the wrong path hashes to "" and every run restored the same
          # stale node_modules regardless of lockfile changes — broke
          # @argos-ci/core sharp resolution after a sharp version bump.
          # Bumped cache prefix to invalidate stragglers from old key.
          key: bun-v2-${{ runner.os }}-${{ hashFiles('workbench/_web/bun.lock') }}
          restore-keys: bun-v2-${{ runner.os }}-

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: |
            .venv
            ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('workbench/_web/package.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Install frontend dependencies
        # --frozen-lockfile so a stale node_modules cache + drifted
        # package.json fail loudly instead of silently running with
        # mismatched deps.
        run: bun install --frozen-lockfile
        working-directory: workbench/_web

      - name: Pin Supabase project_id per run
        # Make config.toml's project_id unique per run so the CLI tags this
        # run's containers/volumes with SUPABASE_PROJECT, not the repo default.
        run: |
          set -euo pipefail
          sed -i.bak -E "s|^project_id = .*$|project_id = \"${SUPABASE_PROJECT}\"|" supabase/config.toml
          grep "^project_id" supabase/config.toml

      - name: Set up local env files
        # Real auth against local Supabase (Postgres), NOT SQLite. Uses the
        # hardcoded deterministic keys so build needn't wait on Supabase.
        run: |
          set -euo pipefail
          printf '%s\n' \
            "NEXT_PUBLIC_LOCAL_DB=false" \
            "NEXT_PUBLIC_DISABLE_AUTH=false" \
            "NEXT_PUBLIC_SUPABASE_URL=${LOCAL_SUPABASE_URL}" \
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=${LOCAL_SUPABASE_ANON_KEY}" \
            "SUPABASE_SERVICE_ROLE_KEY=${LOCAL_SUPABASE_SERVICE_ROLE_KEY}" \
            "DATABASE_URL=${DATABASE_URL}" \
            "ADMIN_EMAILS=${E2E_ADMIN_EMAIL}" \
            "NEXT_PUBLIC_BASE_URL=http://localhost:3000" \
            "NEXT_PUBLIC_BACKEND_URL=http://localhost:8000" \
            "HF_TOKEN=${HF_TOKEN}" \
            > .env
          cp .env workbench/_web/.env
          # Backend reads its own .env; mirror the secrets so CONFIG=e2e
          # picks up NDIF_API_KEY / HF_TOKEN even if env propagation is
          # restricted by the runner.
          printf '%s\n' \
            "CONFIG=e2e" \
            "REMOTE=true" \
            "NDIF_API_KEY=${NDIF_API_KEY}" \
            "HF_TOKEN=${HF_TOKEN}" \
            > workbench/_api/.env

      - name: Start local Supabase (background, fresh, retry+reset)
        run: |
          set -euo pipefail
          mkdir -p "$RUN_TMP"
          rm -f "$RUN_TMP/supabase-start.exitcode"
          # Backgrounded so the container pulls overlap with `next build`.
          # Retries with a reset because `supabase start` occasionally races
          # its own port binds under a cold Docker daemon. Reset is scoped to
          # SUPABASE_PROJECT so concurrent runs are never touched. Skip
          # analytics + vector (flaky Logflare stack; realtime is off in
          # config.toml — the suite needs none of the three).
          nohup bash -c '
            set -uo pipefail
            reset_supabase() {
              supabase stop --no-backup >/dev/null 2>&1 || true
              docker ps -aq --filter "label=com.supabase.cli.project=${SUPABASE_PROJECT}" \
                | xargs -r docker rm -f >/dev/null 2>&1 || true
              docker volume ls -q --filter "label=com.supabase.cli.project=${SUPABASE_PROJECT}" \
                | xargs -r docker volume rm >/dev/null 2>&1 || true
            }
            reset_supabase
            for attempt in $(seq 1 5); do
              echo "=== supabase start attempt ${attempt}/5 ==="
              if supabase start -x analytics,vector; then
                echo 0 > "${RUN_TMP}/supabase-start.exitcode"; exit 0
              fi
              echo "attempt ${attempt} failed; resetting and retrying"
              reset_supabase
              sleep $((attempt * 3))
            done
            echo 1 > "${RUN_TMP}/supabase-start.exitcode"; exit 1
          ' > "$RUN_TMP/supabase-start.log" 2>&1 &
          echo $! > "$RUN_TMP/supabase-start.pid"

      - name: Build app
        run: bun run build
        working-directory: workbench/_web

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium
        working-directory: workbench/_web

      - name: Wait for Supabase + tune Postgres + apply schema
        run: |
          set -euo pipefail
          # Poll REST until ready; fail fast if the background launcher exhausted
          # its retries.
          for i in $(seq 1 600); do
            if curl -sf -o /dev/null -H "apikey: ${LOCAL_SUPABASE_ANON_KEY}" \
                 "${LOCAL_SUPABASE_URL}/rest/v1/"; then
              break
            fi
            if [ -f "$RUN_TMP/supabase-start.exitcode" ] \
               && [ "$(cat "$RUN_TMP/supabase-start.exitcode")" != "0" ]; then
              echo "supabase start exhausted its retries; log:"
              cat "$RUN_TMP/supabase-start.log" || true
              exit 1
            fi
            sleep 1
          done
          curl -sf -o /dev/null -H "apikey: ${LOCAL_SUPABASE_ANON_KEY}" \
            "${LOCAL_SUPABASE_URL}/rest/v1/"

          # Ephemeral CI Postgres — trade durability for speed. full_page_writes
          # off is essential (write amplification on this DB otherwise dominates
          # the run); the volume is destroyed at job end so it's safe. Connect as
          # supabase_admin (the real superuser) over 127.0.0.1 (pg_hba trust rule).
          docker exec -i "supabase_db_${SUPABASE_PROJECT}" \
            psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U supabase_admin -d postgres \
              -c "ALTER SYSTEM SET fsync = off" \
              -c "ALTER SYSTEM SET synchronous_commit = off" \
              -c "ALTER SYSTEM SET full_page_writes = off"
          docker restart "supabase_db_${SUPABASE_PROJECT}"
          # Re-wait for REST after the db bounce (PostgREST reconnects lazily).
          for i in $(seq 1 120); do
            curl -sf -o /dev/null -H "apikey: ${LOCAL_SUPABASE_ANON_KEY}" \
              "${LOCAL_SUPABASE_URL}/rest/v1/" && break
            sleep 1
          done

          # Workbench schema is drizzle-managed (not supabase/migrations).
          # drizzle-kit reads workbench/_web/.env, so run it from there.
          ( cd workbench/_web && bun x drizzle-kit push --force )

          # drizzle creates tables as the `postgres` superuser, so PostgREST's
          # anon/authenticated/service_role roles have no privileges on them.
          # The app writes via the postgres connection (unaffected), but
          # TestingUtils seeds via the service-role supabase-js client (PostgREST),
          # so grant those roles access to the freshly-created public tables.
          docker exec -i "supabase_db_${SUPABASE_PROJECT}" \
            psql -v ON_ERROR_STOP=1 -U postgres -d postgres \
              -c "GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role" \
              -c "GRANT ALL ON ALL TABLES IN SCHEMA public TO anon, authenticated, service_role" \
              -c "GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO anon, authenticated, service_role"

      - name: Start backend (real NDIF)
        run: |
          mkdir -p "$RUN_TMP"
          # Launch the FastAPI backend wired up to the real NDIF service.
          # CONFIG=e2e restricts to gpt2 so /models/ never fetches a gated repo.
          nohup uv run uvicorn workbench._api.main:app \
            --host 0.0.0.0 --port 8000 --log-level info \
            > "$RUN_TMP/api.log" 2>&1 &
          echo $! > "$RUN_TMP/api.pid"
          # Wait until /models/ returns a non-empty JSON array.
          for i in $(seq 1 60); do
            body=$(curl -sf http://localhost:8000/models/ -m 30 || true)
            if [ -n "$body" ] \
                && echo "$body" | jq -e 'type == "array" and length > 0' >/dev/null 2>&1; then
              echo "backend ready ($(echo "$body" | jq 'length') model(s))"
              exit 0
            fi
            sleep 2
          done
          echo "backend failed to come up:"
          tail -200 "$RUN_TMP/api.log"
          exit 1

      - name: Run E2E tests
        run: bun x playwright test
        working-directory: workbench/_web
        env:
          # Surfaced for TestingUtils (createTestUser / loginAsUser / seeds).
          SUPABASE_URL: ${{ env.LOCAL_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ env.LOCAL_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.LOCAL_SUPABASE_SERVICE_ROLE_KEY }}
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}

      - name: Stop services + capture Supabase logs
        if: ${{ always() }}
        run: |
          [ -f "$RUN_TMP/api.pid" ] && kill "$(cat "$RUN_TMP/api.pid")" 2>/dev/null || true
          mkdir -p server-logs
          for c in $(docker ps --filter "label=com.supabase.cli.project=${SUPABASE_PROJECT}" --format '{{.Names}}'); do
            docker logs "$c" > "server-logs/${c}.log" 2>&1 || true
          done
          cp -f "$RUN_TMP/api.log" server-logs/api.log 2>/dev/null || true
          cp -f "$RUN_TMP/supabase-start.log" server-logs/supabase-start.log 2>/dev/null || true
          supabase stop --no-backup || true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: workbench/_web/playwright-report/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: server-logs
          path: server-logs/
          retention-days: 14
