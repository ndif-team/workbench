name: E2E Tests
on:
  push:
    branches: [main, dev, ci-setup]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ripley-cloud-large
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install
        working-directory: workbench/_web

      - name: Set up local env
        run: |
          cat > .env <<EOF
          NEXT_PUBLIC_LOCAL_DB=true
          NEXT_PUBLIC_DISABLE_AUTH=true
          LOCAL_SQLITE_URL=./e2e.db
          NEXT_PUBLIC_BASE_URL=http://localhost:3000
          NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
          EOF
          cp .env workbench/_web/.env

      - name: Create SQLite database
        run: bun x drizzle-kit push --force
        working-directory: workbench/_web

      - name: Build app
        run: bun run build
        working-directory: workbench/_web

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium
        working-directory: workbench/_web

      - name: Run E2E tests
        run: bun x playwright test
        working-directory: workbench/_web

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: workbench/_web/playwright-report/
          retention-days: 7
