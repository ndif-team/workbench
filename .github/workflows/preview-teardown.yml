name: Preview Teardown

# Mirror preview-deploy.yml's use of pull_request_target so we can tear
# down fork-PR previews too (which `pull_request` couldn't, since it
# has no secrets on fork PRs). Also fires on `unlabeled` so removing
# the `preview-deploy` label from a fork PR cleans up its preview.
on:
  pull_request_target:
    types: [closed, unlabeled]
  workflow_dispatch:
    inputs:
      preview_id:
        description: "Preview id of the deployment to tear down (e.g. 113 or 'smoke')."
        required: true

permissions:
  contents: read
  pull-requests: write

env:
  PREVIEW_NAMESPACE_PREFIX: ${{ vars.PREVIEW_NAMESPACE_PREFIX || 'workbench-preview' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  teardown:
    # Run when:
    #   - workflow_dispatch (maintainer-initiated)
    #   - PR closed AND we actually deployed a preview for it: either
    #     same-repo (always deploys) or fork PR that had the
    #     `preview-deploy` label at close time
    #   - `preview-deploy` label was just removed (regardless of close
    #     state) — that's the explicit "stop previewing this fork PR"
    #     gesture
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'closed' && (
        github.event.pull_request.head.repo.full_name == github.repository ||
        contains(github.event.pull_request.labels.*.name, 'preview-deploy')
      )) ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'preview-deploy')
    runs-on: ripley-cloud
    steps:
      - name: Derive preview id
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            preview_id="${{ github.event.pull_request.number }}"
          else
            preview_id="${{ inputs.preview_id }}"
          fi
          {
            echo "preview_id=${preview_id}"
            echo "namespace=${PREVIEW_NAMESPACE_PREFIX}-pr-${preview_id}"
          } | tee -a "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.PREVIEW_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Helm uninstall & delete namespace
        env:
          PR_NUM: ${{ steps.meta.outputs.preview_id }}
          NS: ${{ steps.meta.outputs.namespace }}
        run: |
          if kubectl get namespace "$NS" >/dev/null 2>&1; then
            helm uninstall "pr-${PR_NUM}" --namespace "$NS" --ignore-not-found
            kubectl delete namespace "$NS" --wait=false --ignore-not-found
          else
            echo "Namespace $NS not found, nothing to tear down."
          fi

      - name: Update PR comment
        if: github.event_name == 'pull_request_target'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            🧹 Preview for PR #${{ steps.meta.outputs.preview_id }} torn down.
